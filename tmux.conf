# Keep default prefix (C-b), but make tmux practical for daily dev use.

# Terminal / color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,alacritty:RGB,tmux-256color:RGB"
set -g default-shell /usr/bin/zsh

# Performance / behavior
set -sg escape-time 10
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on
set -g focus-events on

# Numbering / navigation quality-of-life
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g detach-on-destroy off

# Vi-style key tables in copy/status mode
setw -g mode-keys vi
set -g status-keys vi

# Start new panes/windows in current path
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Fast pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Subtle status style
set -g status-style "bg=default,fg=colour244"
set -g window-status-style "fg=colour244"
set -g window-status-current-style "fg=colour252,bold"
set -g pane-border-style "fg=colour239"
set -g pane-active-border-style "fg=colour110"

# TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Machine-local overrides (not tracked in dotfiles repo)
if-shell '[ -f ~/.tmux.conf.local ]' 'source-file ~/.tmux.conf.local'

# Initialize TPM (keep this as the last line in tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
